kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kind-default
nodes:
- role: control-plane
  extraPortMappings:
    - containerPort: 32080
      hostPort: 80
      protocol: TCP
    - containerPort: 32443
      hostPort: 443
      protocol: TCP
- role: control-plane
- role: control-plane
- role: worker
- role: worker
- role: worker
networking:
  # the default CNI will not be installed
  disableDefaultCNI: true
  podSubnet: 10.32.0.0/12
