fullnameOverride: kubernetes-dashboard

metricsScraper:
  enabled: true

extraArgs:
  - --enable-insecure-login
  - --enable-skip-login

ingress:
  enabled: true
  hosts:
    - "dash.k8s.local"
  annotations:
    cert-manager.io/cluster-issuer: local-ca

  tls:
    - hosts:
        - "dash.k8s.local"
      secretName: dash-k8s-local
