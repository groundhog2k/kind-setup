apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: k8sdash-route
spec:
  parentRefs:
    - name: gateway
      sectionName: default-https
  hostnames:
    - "k8sdash"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: k8s-dashboard-kong-proxy
          port: 443
