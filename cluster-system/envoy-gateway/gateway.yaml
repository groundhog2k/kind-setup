kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: cluster-envoygateway
  namespace: cluster-system
  annotations:
    cert-manager.io/cluster-issuer: local-ca
spec:
  gatewayClassName: envoy-gateway-class
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: envoy-proxy
  allowedListeners:
    namespaces:
      from: All
  listeners:
    - name: http
      hostname: "dummy"
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
