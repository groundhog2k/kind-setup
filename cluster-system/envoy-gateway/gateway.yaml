kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: cluster-envoygateway
  namespace: cluster-system
spec:
  gatewayClassName: envoy-gateway-class
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
