ingress:
  enabled: false
  annotations:
    cert-manager.io/cluster-issuer: local-ca
  hosts:
    - host: headlamp
      paths:
        - path: /
          type: ImplementationSpecific
  tls:
    - secretName: headlamp
      hosts:
        - headlamp

httpRoute:
  enabled: true
  parentRefs:
    - kind: ListenerSet
      name: headlamp-listenerset
      namespace: cluster-system
  hostnames:
    - headlamp
  
config:
  inCluster: true
  inClusterContextName: "local-devcluster"
